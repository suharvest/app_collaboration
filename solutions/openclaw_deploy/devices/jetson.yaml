version: "1.0"
id: jetson
name: NVIDIA Jetson
name_zh: NVIDIA Jetson
type: docker_remote

detection:
  method: network_scan
  manual_entry: true

ssh:
  port: 22
  default_user: recomputer
  auth_methods:
    - password

docker_remote:
  compose_file: assets/jetson/docker-compose.yml
  compose_dir: assets/jetson
  remote_path: /home/{{username}}/openclaw
  options:
    project_name: openclaw
    remove_orphans: true
  services:
    - name: openclaw-gateway
      port: 18789
      health_check_endpoint: /healthz
      health_check_timeout: 600
      required: true

user_inputs:
  - id: host
    name: Host / IP
    name_zh: Host / IP
    type: text
    required: true
    placeholder: "192.168.1.100"
  - id: username
    name: SSH Username
    name_zh: SSH Username
    type: text
    default: recomputer
    required: true
  - id: password
    name: SSH Password
    name_zh: SSH Password
    type: password
    required: true
  - id: enable_ollama
    name: Enable Ollama (Local LLM with GPU)
    name_zh: 启用 Ollama（GPU 加速本地大模型）
    type: checkbox
    default: "false"
    row: 1
    description: "Start Ollama with NVIDIA GPU acceleration for local AI inference"
    description_zh: "启动 Ollama 并使用 NVIDIA GPU 加速本地 AI 推理"
  - id: ollama_model
    name: Ollama Model
    name_zh: Ollama 模型
    type: select
    default: "qwen3.5:2b"
    row: 1
    description: "Model to pull and use with Ollama"
    description_zh: "Ollama 使用的模型"
    show_when:
      field: enable_ollama
      value: "true"
    options:
      - value: "qwen3.5:2b"
        label: "Qwen3.5 2B (lightweight)"
        label_zh: "Qwen3.5 2B（轻量）"
      - value: "qwen3.5:4b"
        label: "Qwen3.5 4B (balanced)"
        label_zh: "Qwen3.5 4B（均衡）"

actions:
  before:
    - name: Validate Jetson runtime
      name_zh: 验证 Jetson 环境
      run: |
        set -e

        [ -f /etc/nv_tegra_release ] || {
          echo "Not a Jetson device: /etc/nv_tegra_release is missing"
          exit 1
        }

        docker info >/dev/null 2>&1 || {
          echo "Docker is not available"
          exit 1
        }

        docker info | grep -Eq "Runtimes:.*nvidia| nvidia" || {
          echo "NVIDIA docker runtime is not detected"
          exit 1
        }

        # Disk/memory thresholds depend on whether Ollama is enabled
        # OpenClaw alone: ~12GB disk, 4GB RAM
        # OpenClaw + Ollama: ~20GB disk, 8GB RAM
        if [ "{{enable_ollama}}" = "true" ]; then
          MIN_DISK=20
          MIN_MEM=8
        else
          MIN_DISK=12
          MIN_MEM=4
        fi

        FREE_GB=$(df -BG / | awk 'NR==2{gsub(/G/,"",$4); print $4}')
        [ "${FREE_GB:-0}" -ge "$MIN_DISK" ] || {
          echo "Need at least ${MIN_DISK}GB free disk, current: ${FREE_GB:-0}GB"
          exit 1
        }

        MEM_GB=$(free -g | awk '/^Mem:/{print $2}')
        [ "${MEM_GB:-0}" -ge "$MIN_MEM" ] || {
          echo "Need at least ${MIN_MEM}GB system memory, current: ${MEM_GB:-0}GB"
          exit 1
        }
    - name: Ensure docker compose command
      name_zh: 确保 docker compose 可用
      run: |
        set -e
        docker compose version >/dev/null 2>&1 || docker-compose --version >/dev/null 2>&1 || {
          echo "Docker Compose is unavailable. Need either 'docker compose' (v2 plugin) or 'docker-compose' (standalone)."
          echo "Install it: sudo apt-get install -y docker-compose-plugin"
          exit 1
        }
        echo "Docker Compose is available"
    - name: Initialize OpenClaw config
      name_zh: 初始化 OpenClaw 配置
      run: |
        set -e
        VOL="openclaw_openclaw-config"
        docker volume create "$VOL" 2>/dev/null || true
        WS_VOL="openclaw_openclaw-workspace"
        docker volume create "$WS_VOL" 2>/dev/null || true
        docker run --rm -v "$VOL":/data -v "$WS_VOL":/ws alpine sh -c '
          chown 1000:1000 /data /ws
          if [ ! -f /data/openclaw.json ]; then
            cat > /data/openclaw.json <<VOLCFG
        {"gateway":{"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true}}}
        VOLCFG
            chown 1000:1000 /data/openclaw.json
            echo "Initial config written"
          else
            echo "Config exists, skipping"
          fi
        '

  after:
    - name: Start Ollama with GPU
      name_zh: 启动 Ollama（GPU 加速）
      when:
        field: enable_ollama
        value: "true"
      run: |
        set -e
        # Check if Ollama is already running (native install)
        if curl -sf http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
          echo "Ollama is already running on port 11434, skipping Docker start"
          exit 0
        fi
        COMPOSE_FILE="/home/{{username}}/openclaw/jetson/docker-compose-ollama.yml"
        echo "Pulling Ollama image (this may take a few minutes on first run)..."
        docker compose -f "$COMPOSE_FILE" pull
        echo "Starting Ollama container..."
        docker compose -f "$COMPOSE_FILE" -p openclaw up -d
        echo "Waiting for Ollama to be ready..."
        for i in $(seq 1 30); do
          if docker exec ollama ollama list >/dev/null 2>&1; then
            echo "Ollama is ready"
            break
          fi
          sleep 2
        done
      timeout: 600

    - name: Pull Ollama model
      name_zh: 拉取 Ollama 模型
      when:
        field: enable_ollama
        value: "true"
      run: |
        set -e
        echo "Pulling model {{ollama_model}}..."
        # Use docker exec if container is running, otherwise native ollama
        if docker exec ollama true >/dev/null 2>&1; then
          docker exec ollama ollama pull {{ollama_model}}
        elif command -v ollama >/dev/null 2>&1; then
          ollama pull {{ollama_model}}
        else
          echo "ERROR: No Ollama instance available"
          exit 1
        fi
        echo "Model {{ollama_model}} pulled successfully"
      timeout: 600

    - name: Configure Ollama provider in OpenClaw
      name_zh: 在 OpenClaw 中配置 Ollama
      when:
        field: enable_ollama
        value: "true"
      run: |
        set -e
        echo "Configuring Ollama provider in OpenClaw..."
        docker exec openclaw-gateway node -e '
          const fs = require("fs");
          const p = "/home/node/.openclaw/openclaw.json";
          const cfg = JSON.parse(fs.readFileSync(p, "utf8"));
          if (!cfg.models) cfg.models = {};
          if (!cfg.models.providers) cfg.models.providers = {};
          cfg.models.providers.ollama = {
            baseUrl: "http://localhost:11434/v1",
            apiKey: "ollama",
            api: "openai-completions"
          };
          fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
          console.log("Ollama provider injected into openclaw.json");
        '
      timeout: 30

    - name: Display gateway access token
      name_zh: 显示网关访问令牌
      run: |
        set -e
        TOKEN=$(docker exec openclaw-gateway node -e '
          const fs = require("fs");
          const p = "/home/node/.openclaw/openclaw.json";
          const cfg = JSON.parse(fs.readFileSync(p, "utf8"));
          const token = cfg.gateway && cfg.gateway.auth && cfg.gateway.auth.token;
          if (token) process.stdout.write(token);
          else process.stdout.write("NOT_FOUND");
        ')
        if [ "$TOKEN" = "NOT_FOUND" ]; then
          echo "WARNING: Could not read gateway token from config"
        else
          echo ""
          echo "=========================================="
          echo "  OpenClaw Gateway Token"
          echo "=========================================="
          echo ""
          echo "  $TOKEN"
          echo ""
          echo "=========================================="
          echo ""
          echo "Open http://{{host}}:18789 in your browser"
          echo "and enter this token to log in."
          echo ""
        fi
      timeout: 30

post_deployment:
  open_browser: false
