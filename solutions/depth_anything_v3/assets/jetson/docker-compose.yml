services:
  depth-anything-v3:
    image: chenduola6/depth_anything_v3:jp6.2
    container_name: depth_anything_v3
    restart: unless-stopped
    runtime: nvidia
    network_mode: host
    ipc: host
    privileged: true
    stdin_open: true
    tty: true
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - TZ=${TZ:-Asia/Shanghai}
      - ENCODER=${ENCODER:-x264enc}
      - STREAM_FPS=${STREAM_FPS:-6}
      - BITRATE_KBPS=${BITRATE_KBPS:-1500}
      - PANEL_WIDTH=${PANEL_WIDTH:-480}
      - PANEL_HEIGHT=${PANEL_HEIGHT:-360}
      - MAX_POINTS=${MAX_POINTS:-8000}
      - POINT_RADIUS=${POINT_RADIUS:-1}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - /etc/localtime:/etc/localtime:ro
    command:
      - bash
      - -lc
      - |
        set -e
        source /opt/ros/humble/setup.bash
        cd workspace/ros2-depth-anything-v3-trt
        export ENCODER="${ENCODER:-x264enc}"
        export STREAM_FPS="${STREAM_FPS:-6}"
        export BITRATE_KBPS="${BITRATE_KBPS:-1500}"
        export PANEL_WIDTH="${PANEL_WIDTH:-480}"
        export PANEL_HEIGHT="${PANEL_HEIGHT:-360}"
        export MAX_POINTS="${MAX_POINTS:-8000}"
        export POINT_RADIUS="${POINT_RADIUS:-1}"
        exec ./run_camera_depth_rtsp.sh
